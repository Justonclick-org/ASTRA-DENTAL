<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Astra Dental Clinic</title>
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = globalThis.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replaceAll('&', '~and~') +
        (l.search ? '&' + l.search.slice(1).replaceAll('&', '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
