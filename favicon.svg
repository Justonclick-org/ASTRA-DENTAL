<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="44"/>
    </clipPath>
  </defs>
  <!-- Clinic photo clipped to circle -->
  <image href="favicon-logo.jpg"
    x="0" y="0" width="100" height="100"
    clip-path="url(#c)"
    preserveAspectRatio="xMidYMid slice"
  />
  <!-- Gold border ring on top -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#C9A84C" stroke-width="5"/>
</svg>
