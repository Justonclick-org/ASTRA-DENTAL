<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy circle background -->
  <circle cx="50" cy="50" r="50" fill="#1E3A8A"/>
  <!--
    Tooth FILLED gold — much more visible at 16×16 than stroke-only.
    Paths scaled via translate(20,10) scale(0.6) to fit 100×100 viewBox.
  -->
  <g transform="translate(20 10) scale(0.6)">
    <!-- Solid gold tooth body -->
    <path
      d="M50 6 C37 6 24 13 17 25 C8 40 8 60 12 78
         C16 96 25 114 37 122 C41 125 46 126 50 124
         C54 126 59 125 63 122 C75 114 84 96 88 78
         C92 60 92 40 83 25 C76 13 63 6 50 6 Z"
      fill="#C9A84C"
    />
    <!-- Navy swoosh carved through it for the signature detail -->
    <path
      d="M35 28 Q47 68 61 110"
      stroke="#1E3A8A" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.55"
    />
  </g>
</svg>
